<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛡️ Agente Empresa — SISDEL</title>
<link rel="stylesheet" href="css/panel.css">
<style>
* { box-sizing:border-box; }
body { min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:.5rem; margin:0; }
.agent-wrap { max-width:500px; width:100%; }
.agent-card { background:#111325; border:1px solid #2a2d45; border-radius:12px; padding:1rem; margin-bottom:.8rem; }
.agent-header { text-align:center; margin-bottom:1.2rem; }
.agent-header h1 { font-size:1.2rem; color:#ff8c00; margin:0; }
.agent-header p { font-size:.75rem; color:#6b7294; margin:.3rem 0 0; }
.login-input { width:100%; padding:.7rem 1rem; background:#0b0d17; border:1px solid #2a2d45; border-radius:8px; color:#fff; font-size:1.1rem; font-family:monospace; text-align:center; letter-spacing:3px; }
.login-input:focus { border-color:#ff8c00; outline:none; }
.login-btn { width:100%; padding:.7rem; background:linear-gradient(135deg,#ff8c00,#ff6600); color:#fff; font-weight:700; font-size:.9rem; border:none; border-radius:8px; cursor:pointer; margin-top:.6rem; }
.agent-topbar { display:flex; justify-content:space-between; align-items:center; padding:.5rem .7rem; background:rgba(255,140,0,.06); border:1px solid rgba(255,140,0,.2); border-radius:10px; margin-bottom:.6rem; }
.agent-name { font-weight:700; color:#ff8c00; font-size:.82rem; }
.agent-code { font-size:.62rem; color:#6b7294; font-family:monospace; }
.topbar-btns { display:flex; gap:.3rem; }
.topbar-btn { background:rgba(77,166,255,.1); border:1px solid rgba(77,166,255,.25); color:#4da6ff; padding:.25rem .5rem; border-radius:6px; font-size:.65rem; font-weight:700; cursor:pointer; }
.topbar-btn.danger { color:#ff3b3b; border-color:rgba(255,59,59,.25); background:rgba(255,59,59,.08); }
.caso-card { background:#111325; border:1px solid #2a2d45; border-radius:10px; padding:.7rem; margin-bottom:.7rem; transition:border-color .3s; }
.caso-card.activa { border-color:rgba(255,59,59,.4); }
.caso-card.en_camino { border-color:rgba(255,165,0,.4); }
.caso-card.atendida { border-color:rgba(0,214,143,.3); opacity:.7; }
.caso-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.4rem; }
.caso-numero { font-family:monospace; font-weight:900; color:#ff8c00; font-size:.85rem; }
.caso-field { margin-bottom:.3rem; }
.caso-label { font-size:.58rem; color:#6b7294; text-transform:uppercase; letter-spacing:.5px; }
.caso-val { font-size:.8rem; color:#fff; font-weight:600; }
.badge { padding:.15rem .45rem; border-radius:5px; font-size:.65rem; font-weight:700; }
.badge-act { background:rgba(255,59,59,.15); color:#ff3b3b; border:1px solid rgba(255,59,59,.3); }
.badge-cam { background:rgba(255,165,0,.15); color:#ffa500; border:1px solid rgba(255,165,0,.3); }
.badge-ok  { background:rgba(0,214,143,.15); color:#00d68f; border:1px solid rgba(0,214,143,.3); }
.caso-actions { display:flex; gap:.4rem; margin-top:.5rem; }
.caso-btn { flex:1; padding:.4rem; border-radius:7px; font-weight:700; font-size:.72rem; cursor:pointer; border:none; }
.caso-btn.camino { background:rgba(255,165,0,.15); color:#ffa500; border:1px solid rgba(255,165,0,.3); }
.caso-btn.atender { background:rgba(0,214,143,.15); color:#00d68f; border:1px solid rgba(0,214,143,.3); }
.caso-btn.maps { background:rgba(77,166,255,.12); color:#4da6ff; border:1px solid rgba(77,166,255,.3); }
.vehiculo-info { background:rgba(255,140,0,.05); border:1px solid rgba(255,140,0,.2); border-radius:8px; padding:.4rem .6rem; margin-top:.4rem; }
@keyframes pulseNew { 0%,100% { box-shadow:0 0 0 0 rgba(255,140,0,.4); } 50% { box-shadow:0 0 15px 5px rgba(255,140,0,.3); } }
.caso-card.nueva { animation:pulseNew 1.5s infinite; border-color:#ff8c00; }
.stats-bar { display:flex; gap:.4rem; margin-bottom:.6rem; }
.stat-chip { flex:1; text-align:center; padding:.3rem; border-radius:8px; background:#111325; border:1px solid #2a2d45; }
.stat-num { font-weight:900; font-size:1rem; }
.stat-lbl { font-size:.55rem; color:#6b7294; text-transform:uppercase; }
.empty-state { text-align:center; padding:2rem 1rem; color:#6b7294; }
.empty-state .icon { font-size:2.5rem; margin-bottom:.5rem; }
.alerta-overlay { display:none; position:fixed; inset:0; z-index:9999; background:rgba(255,140,0,.85); flex-direction:column; align-items:center; justify-content:center; animation:flashOrange .5s infinite; }
@keyframes flashOrange { 0%,100% { background:rgba(255,140,0,.85); } 50% { background:rgba(200,100,0,.95); } }
.alerta-overlay h2 { color:#fff; font-size:1.8rem; margin:0; text-shadow:0 2px 10px rgba(0,0,0,.5); }
.alerta-overlay p { color:#fff; font-size:1rem; margin:.5rem 0; }
.alerta-overlay .dismiss-btn { margin-top:1.5rem; padding:.8rem 2rem; background:#fff; color:#ff8c00; font-weight:900; font-size:1.1rem; border:none; border-radius:12px; cursor:pointer; }
.activar-sonido { width:100%; padding:.5rem; background:rgba(255,140,0,.15); color:#ffa500; border:1px solid rgba(255,140,0,.3); border-radius:8px; font-size:.72rem; font-weight:700; cursor:pointer; margin-bottom:.5rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="agent-wrap" id="login-view">
    <div class="agent-header" style="margin-top:3rem;">
        <div style="font-size:2.5rem;">🛡️</div>
        <h1>Panel de Agente — Empresa</h1>
        <p>Ingresa tu código de acceso o documento</p>
    </div>
    <div class="agent-card">
        <input type="text" id="agent-id" class="login-input" placeholder="Código o Documento" autocomplete="off" autofocus>
        <button class="login-btn" onclick="loginAgente()">🔐 Ingresar</button>
        <div id="login-error" style="display:none;margin-top:.5rem;text-align:center;color:#ff3b3b;font-size:.78rem;"></div>
    </div>
    <p style="text-align:center;font-size:.65rem;color:#6b7294;">Botón de Alerta SISDEL v1.0</p>
</div>

<!-- PANEL DE CASOS -->
<div class="agent-wrap" id="casos-view" style="display:none;">
    <div class="agent-topbar">
        <div>
            <div class="agent-name" id="agent-nombre">🛡️ Agente</div>
            <div class="agent-code" id="agent-codigo">Código: ---</div>
        </div>
        <div class="topbar-btns">
            <button class="topbar-btn" onclick="cargarMisCasos()">🔄</button>
            <button class="topbar-btn danger" onclick="logout()">Salir</button>
        </div>
    </div>
    <div class="stats-bar">
        <div class="stat-chip"><div class="stat-num" style="color:#ff3b3b;" id="st-activas">0</div><div class="stat-lbl">Activas</div></div>
        <div class="stat-chip"><div class="stat-num" style="color:#ffa500;" id="st-camino">0</div><div class="stat-lbl">En Camino</div></div>
        <div class="stat-chip"><div class="stat-num" style="color:#00d68f;" id="st-atendidas">0</div><div class="stat-lbl">Atendidas</div></div>
    </div>
    
    <button class="activar-sonido" id="btn-activar-sonido" onclick="activarSonido()" style="display:none;">🔔 Toca aquí para activar alertas sonoras</button>
    <div id="casos-lista"></div>
</div>

<!-- ALERTA OVERLAY -->
<div class="alerta-overlay" id="alerta-overlay">
    <div style="font-size:4rem;">🚨</div>
    <h2>¡NUEVA EMERGENCIA!</h2>
    <p id="alerta-caso-info">Caso asignado</p>
    <p style="font-size:.8rem; opacity:.8;">Toca para ver detalles</p>
    <button class="dismiss-btn" id="btn-ver-caso" onclick="dismissAlertaYVerCaso()">VER CASO →</button>
    <button style="margin-top:.8rem; padding:.5rem 1.5rem; background:transparent; color:#fff; font-weight:700; font-size:.85rem; border:2px solid rgba(255,255,255,.5); border-radius:8px; cursor:pointer;" onclick="dismissAlerta()">Cerrar</button>
</div>

<script>
const API = (window.location.hostname==='localhost'||window.location.protocol==='file:') ? 'http://localhost:8000' : 'https://boton-de-panico-sisdel.onrender.com';
let _agentData = null;
let _prevCasosIds = new Set();
let _isFirstLoad = true;

document.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('sisdel_agente_empresa');
    if (saved) { 
        _agentData = JSON.parse(saved); 
        _isFirstLoad = true;
        _prevCasosIds = new Set((_agentData.casos || []).map(c => c.id_alerta));
        mostrarCasos(); 
    } else {
        const savedId = sessionStorage.getItem('sisdel_agente_emp_id');
        if (savedId) {
            document.getElementById('agent-id').value = savedId;
            loginAgente();
        }
    }
    document.getElementById('agent-id').addEventListener('keydown', e => { if(e.key==='Enter') loginAgente(); });
});

async function loginAgente() {
    const id = document.getElementById('agent-id').value.trim();
    if (!id) { showErr('Ingresa tu código o documento'); return; }
    document.getElementById('login-error').style.display = 'none';
    
    try {
        const res = await fetch(`${API}/api/empresa/agentes/login`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({identificador: id})
        });
        if (!res.ok) { showErr('❌ Código o documento no encontrado'); return; }
        const data = await res.json();
        
        _agentData = data;
        sessionStorage.setItem('sisdel_agente_empresa', JSON.stringify(data));
        
        _isFirstLoad = true;
        _prevCasosIds = new Set((_agentData.casos || []).map(c => c.id_alerta));
        mostrarCasos();
        
        // Pedir permiso para notificaciones
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    } catch { showErr('⚠️ Error de conexión'); }
}

function showErr(m) { const e=document.getElementById('login-error'); e.textContent=m; e.style.display='block'; }

function mostrarCasos() {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('casos-view').style.display = 'block';
    document.getElementById('agent-nombre').textContent = `🛡️ ${_agentData.agente.nombre}`;
    document.getElementById('agent-codigo').textContent = `Código: ${_agentData.agente.codigo_agente} | Doc: ${_agentData.agente.num_identificacion}`;
    
    document.getElementById('btn-activar-sonido').style.display = 'block';

    renderCasos(_agentData.casos || []);
    if (typeof _pollingId === 'undefined' || !_pollingId) {
        window._pollingId = setInterval(cargarMisCasos, 5000);
    }
}

async function cargarMisCasos() {
    if (!_agentData) return;
    try {
        const res = await fetch(`${API}/api/empresa/agentes/login`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({identificador: _agentData.agente.num_identificacion})
        });
        if (!res.ok) return;
        const data = await res.json();
        _agentData.casos = data.casos || [];
        sessionStorage.setItem('sisdel_agente_empresa', JSON.stringify(_agentData));

        const currentIds = new Set(_agentData.casos.map(c => c.id_alerta));
        const nuevos = _agentData.casos.filter(c => !_prevCasosIds.has(c.id_alerta) && c.estatus !== 'ATENDIDA');

        if (nuevos.length > 0 && !_isFirstLoad) {
            alertaNuevoCaso(nuevos);
        }

        _prevCasosIds = currentIds;
        _isFirstLoad = false;
        renderCasos(_agentData.casos);
    } catch {}
}

// ── SISTEMA DE SONIDO (Web Audio API) ──
let _audioCtx = null;
let _sonidoActivado = false;
let _sirenInterval = null;
let _audioFallback = new Audio('https://www.soundjay.com/button/beep-07.mp3');

function activarSonido() {
    if (_sonidoActivado) return;
    try {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = _audioCtx.createOscillator();
        const gain = _audioCtx.createGain();
        gain.gain.value = 0.01;
        osc.connect(gain); gain.connect(_audioCtx.destination);
        osc.start(); osc.stop(_audioCtx.currentTime + 0.1);
        _sonidoActivado = true;
        
        _audioFallback.play().then(() => _audioFallback.pause()).catch(()=>{});

        const btn = document.getElementById('btn-activar-sonido');
        if (btn) btn.style.display = 'none';
        console.log("🔊 Audio desbloqueado");
    } catch {}
}

document.body.addEventListener('click', activarSonido, { once: true });
document.body.addEventListener('touchstart', activarSonido, { once: true });

function tocarSirena() {
    if (!_audioCtx || !_sonidoActivado) {
        _audioFallback.play().catch(()=>{});
        return;
    }
    let repeticiones = 0;
    _sirenInterval = setInterval(() => {
        if (repeticiones >= 8) { clearInterval(_sirenInterval); _sirenInterval = null; return; }
        const osc = _audioCtx.createOscillator();
        const gain = _audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, _audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(1200, _audioCtx.currentTime + 0.15);
        osc.frequency.linearRampToValueAtTime(800, _audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, _audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, _audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(_audioCtx.destination);
        osc.start(); osc.stop(_audioCtx.currentTime + 0.4);
        repeticiones++;
    }, 500);
}

function detenerSirena() {
    if (_sirenInterval) { clearInterval(_sirenInterval); _sirenInterval = null; }
    _audioFallback.pause();
    _audioFallback.currentTime = 0;
}

// ── ALERTA NUEVO CASO ──
let _ultimoCasoNuevoId = null;
let _alertaAutoCloseTimer = null;

function alertaNuevoCaso(nuevos) {
    const c = nuevos[0];
    _ultimoCasoNuevoId = c.id_alerta;

    const overlay = document.getElementById('alerta-overlay');
    const info = document.getElementById('alerta-caso-info');
    if (overlay && info) {
        const veh = `${c.placas_vehiculo||''} ${c.tipo_vehiculo||''} ${c.color_vehiculo||''}`.trim();
        info.innerHTML = `<strong>Piloto:</strong> ${c.nombre_piloto}<br><strong>Vehículo:</strong> ${veh || 'Sin detalles'}`;
        overlay.style.display = 'flex';
    }

    tocarSirena();

    if (navigator.vibrate) {
        navigator.vibrate([500, 200, 500, 200, 500, 200, 800, 300, 800, 300, 1000]);
    }

    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('🚨 ¡EMERGENCIA ASIGNADA!', {
            body: `Piloto: ${c.nombre_piloto}\nUbicación: ${c.direccion_aproximada || c.direccion || 'Sin dirección'}`,
            tag: c.id_alerta,
            requireInteraction: true,
            vibrate: [500, 200, 500, 200, 500]
        });
    }

    setTimeout(() => {
        document.querySelectorAll('.caso-card.nueva').forEach(el => el.classList.remove('nueva'));
    }, 15000);

    if (_alertaAutoCloseTimer) clearTimeout(_alertaAutoCloseTimer);
    _alertaAutoCloseTimer = setTimeout(() => dismissAlerta(), 15000);
}

function dismissAlerta() {
    detenerSirena();
    if (navigator.vibrate) navigator.vibrate(0);
    document.getElementById('alerta-overlay').style.display = 'none';
    if (_alertaAutoCloseTimer) { clearTimeout(_alertaAutoCloseTimer); _alertaAutoCloseTimer = null; }
}

function dismissAlertaYVerCaso() {
    dismissAlerta();
    if (_ultimoCasoNuevoId) {
        const casoEl = document.getElementById('caso-' + _ultimoCasoNuevoId);
        if (casoEl) {
            casoEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            casoEl.style.transition = 'box-shadow .3s';
            casoEl.style.boxShadow = '0 0 20px rgba(255,140,0,.6)';
            setTimeout(() => { casoEl.style.boxShadow = ''; }, 3000);
        }
    }
}

// ── RENDER CASOS ──
function renderCasos(casos) {
    const el = document.getElementById('casos-lista');

    const activas = casos.filter(c => c.estatus === 'ACTIVA').length;
    const camino = casos.filter(c => c.estatus === 'EN_CAMINO').length;
    const atendidas = casos.filter(c => ['ATENDIDA','FALSA_ALARMA','CANCELADA'].includes(c.estatus)).length;
    document.getElementById('st-activas').textContent = activas;
    document.getElementById('st-camino').textContent = camino;
    document.getElementById('st-atendidas').textContent = atendidas;

    if (!casos.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">🛡️</div><p>Sin casos asignados</p></div>';
        return;
    }

    const orden = { 'ACTIVA':0, 'EN_CAMINO':1, 'ATENDIDA':2, 'FALSA_ALARMA':3, 'CANCELADA':4 };
    casos.sort((a,b) => (orden[a.estatus]||9) - (orden[b.estatus]||9));

    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const isNuevo = (id) => !_isFirstLoad && !_prevCasosIds.has(id);

    el.innerHTML = casos.map(c => {
        const cls = c.estatus==='ACTIVA'?'activa':c.estatus==='EN_CAMINO'?'en_camino':'atendida';
        const badgeCls = c.estatus==='ACTIVA'?'badge-act':c.estatus==='EN_CAMINO'?'badge-cam':'badge-ok';
        const esNuevo = isNuevo(c.id_alerta);
        
        let d = c.fecha_creacion;
        if (d && !d.endsWith('Z')) d += 'Z'; // Asegurar UTC
        const fecha = d ? new Date(d).toLocaleString([], { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:false, timeZone:tz }) : '—';
        
        const gpsBtn = c.gps_latitud ? `<button class="caso-btn maps" onclick="window.open('https://www.google.com/maps?q=${c.gps_latitud},${c.gps_longitud}','_blank')">📍 Mapa</button>` : '';

        // Cronómetro
        let crono = '';
        const creado = d ? new Date(d) : new Date();
        if (c.estatus === 'ATENDIDA' || c.estatus === 'FALSA_ALARMA' || c.estatus === 'CANCELADA') {
            let att = c.fecha_atencion;
            if (att && !att.endsWith('Z')) att += 'Z';
            if (att) {
                const atendido = new Date(att);
                const diff = Math.floor((atendido - creado) / 1000);
                const m = Math.floor(diff / 60); const s = diff % 60;
                crono = `<div style="font-size:.7rem; color:#00d68f; font-weight:700; margin-top:.3rem;">⏱️ Atendido en ${m}m ${s.toString().padStart(2,'0')}s</div>`;
            }
        } else {
            crono = `<div style="font-size:.75rem; color:#ff8c00; font-weight:900; margin-top:.3rem; font-family:monospace;" id="crono-${c.id_alerta}" data-inicio="${creado.getTime()}">⏱️ --:--</div>`;
        }

        const actions = (c.estatus==='ACTIVA'||c.estatus==='EN_CAMINO') ? `
            <div class="caso-actions">
                ${gpsBtn}
                ${c.estatus==='ACTIVA' ? `<button class="caso-btn camino" onclick="cambiarEstatusCaso('${c.id_alerta}','EN_CAMINO',this)">🚓 En Camino</button>` : ''}
                <button class="caso-btn atender" onclick="cambiarEstatusCaso('${c.id_alerta}','ATENDIDA',this)">✅ Atendido</button>
            </div>` : '';

        let gpsBlock = '';
        if (c.gps_latitud && c.gps_longitud) {
            gpsBlock = `
                <div class="caso-field" style="margin-top:.5rem; background:rgba(255,140,0,.08); padding:.5rem; border-radius:8px; border:1px solid rgba(255,140,0,.3);">
                    <div class="caso-label">UBICACIÓN GPS (TOCA PARA ABRIR WAZE)</div>
                    <div class="caso-val" style="font-family:monospace; font-size:.82rem; font-weight:900; margin-top:.3rem;">
                        <a href="https://waze.com/ul?ll=${c.gps_latitud},${c.gps_longitud}&navigate=yes" target="_blank" style="color:#ff8c00; text-decoration:none; display:flex; align-items:center; gap:.4rem;">
                           <span style="font-size:1.3rem;">🚗</span> 
                           ${c.gps_latitud.toFixed(6)}, ${c.gps_longitud.toFixed(6)}
                        </a>
                    </div>
                </div>`;
        } else {
            gpsBlock = `<div class="caso-field"><div class="caso-label">Dirección / Ref</div><div class="caso-val">📍 ${c.direccion_aproximada || c.direccion || '—'}</div></div>`;
        }

        return `
        <div class="caso-card ${cls} ${esNuevo ? 'nueva' : ''}" id="caso-${c.id_alerta}">
            <div class="caso-header">
                <span class="caso-numero">${c.numero_caso || '—'}</span>
                <span class="badge ${badgeCls}">${c.estatus}</span>
            </div>
            <div class="caso-field"><div class="caso-label">Piloto</div><div class="caso-val">👤 ${c.nombre_piloto||'—'}</div></div>
            <div class="vehiculo-info">
                <div style="display:flex;gap:.6rem;font-size:.78rem;">
                    <div><span class="caso-label">Placas</span><div style="color:#ff8c00;font-weight:900;">${c.placas_vehiculo||'—'}</div></div>
                    <div><span class="caso-label">Tipo</span><div>${c.tipo_vehiculo||'—'}</div></div>
                    <div><span class="caso-label">Color</span><div>${c.color_vehiculo||'—'}</div></div>
                </div>
            </div>
            <div class="caso-field" style="margin-top:.4rem;"><div class="caso-label">Teléfono</div><div class="caso-val">📱 <a href="tel:${c.telefono_piloto}" style="color:#4da6ff;">${c.telefono_piloto||'—'}</a></div></div>
            
            ${gpsBlock}

            <div style="font-size:.6rem; color:#6b7294; margin-top:.4rem;">📅 ${fecha}</div>
            ${crono}
            ${actions}
        </div>`;
    }).join('');

    actualizarCronometros();
}

async function cambiarEstatusCaso(id, estatus, btn) {
    if (btn) { btn.disabled = true; btn.textContent = '⏳...'; }
    try {
        const res = await fetch(`${API}/api/empresa/alertas/${id}/estatus`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ estatus })
        });
        if (res.ok) {
            await cargarMisCasos();
        } else {
            alert('Error al actualizar estatus');
            if (btn) { btn.disabled = false; btn.textContent = estatus === 'ATENDIDA' ? '✅ Atendido' : '🚓 En Camino'; }
        }
    } catch {
        alert('Error de conexión');
        if (btn) { btn.disabled = false; btn.textContent = estatus === 'ATENDIDA' ? '✅ Atendido' : '🚓 En Camino'; }
    }
}

// ── CRONÓMETROS ACTIVOS ──
let _cronoInterval = null;
function actualizarCronometros() {
    if (_cronoInterval) clearInterval(_cronoInterval);
    _cronoInterval = setInterval(() => {
        document.querySelectorAll('[id^="crono-"]').forEach(el => {
            const inicio = parseInt(el.dataset.inicio);
            if (!inicio) return;
            const diff = Math.floor((Date.now() - inicio) / 1000);
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            const s = diff % 60;
            el.textContent = h > 0
                ? `⏱️ ${h}h ${m.toString().padStart(2,'0')}m ${s.toString().padStart(2,'0')}s`
                : `⏱️ ${m}m ${s.toString().padStart(2,'0')}s`;
        });
    }, 1000);
}

function logout() {
    _agentData = null;
    _prevCasosIds = new Set();
    _isFirstLoad = true;
    sessionStorage.removeItem('sisdel_agente_empresa');
    if (window._pollingId) { clearInterval(window._pollingId); window._pollingId = null; }
    document.getElementById('login-view').style.display = 'block';
    document.getElementById('casos-view').style.display = 'none';
    document.getElementById('agent-id').value = '';
}
