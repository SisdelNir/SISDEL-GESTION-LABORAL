services:
  - type: web
    name: gestion-laboral
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ROOT_CODE
        value: "1122"
    disk:
      name: gestion-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
